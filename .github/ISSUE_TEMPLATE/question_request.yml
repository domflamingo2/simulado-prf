name: 📚 Nova questão
description: Adicione uma nova questão ao banco de simulados (Certo ou Errado).
title: "[QUESTION] "
labels: ["question"]

body:
  - type: dropdown
    id: category
    attributes:
      label: 📖 Matéria
      options:
        - Língua Portuguesa
        - Raciocínio Lógico-Matemático
        - Informática
        - Ética no Serviço Público
        - Direito Constitucional (Noções)
        - Direito Administrativo (Noções)
        - Administração (Noções)
        - Arquivologia (Noções)
        - Legislação da PRF
    validations:
      required: true

  - type: input
    id: topic
    attributes:
      label: 📌 Tema específico
      description: Assunto dentro da matéria
      placeholder: Ex: Direitos Fundamentais / Concordância Verbal / Redes de Computadores
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: 🎯 Dificuldade
      options:
        - Fácil
        - Médio
        - Difícil
    validations:
      required: true

  - type: input
    id: exam-board
    attributes:
      label: 🏛️ Banca
      description: Se a questão for baseada em alguma banca
      placeholder: Ex: CEBRASPE (CESPE)

  - type: input
    id: year
    attributes:
      label: 📅 Ano
      placeholder: Ex: 2022

  - type: textarea
    id: statement
    attributes:
      label: 📝 Enunciado
      description: Escreva a afirmação que será julgada como certa ou errada.
      placeholder: |
        Exemplo:
        "A Constituição Federal de 1988 permite a prisão civil por dívida, em qualquer caso."
    validations:
      required: true

  - type: dropdown
    id: correct-answer
    attributes:
      label: ✅ Resposta correta
      options:
        - Certo
        - Errado
    validations:
      required: true

  - type: textarea
    id: explanation
    attributes:
      label: 🧠 Explicação da resposta
      description: Explique de forma clara e objetiva.
      placeholder: |
        Exemplo:
        "A CF/88 só permite prisão civil em caso de dívida de alimentos."
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: 🔗 Fonte (opcional)
      description: Link ou referência da questão
      placeholder: Ex: Prova PRF 2021 / Livro X / Site Y

  - type: dropdown
    id: status
    attributes:
      label: 📊 Status da questão
      description: Controle interno do banco
      options:
        - Nova
        - Revisada
        - Aprovada
    validations:
      required: true

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: ✅ Confirmações
      description: Leia antes de enviar.
      options:
        - label: A questão está clara e sem ambiguidade.
          required: true
        - label: A resposta correta foi revisada.
          required: true
        - label: A explicação está completa e correta.
          required: true