name: ⭐ Sugestão de funcionalidade
description: Sugira uma nova funcionalidade para o sistema de simulados
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: textarea
    id: feature-description
    attributes:
      label: 📌 Descrição da funcionalidade
      description: Explique claramente o que você gostaria que fosse adicionado.
      placeholder: |
        Exemplo:
        "Permitir pausar o simulado e continuar depois de onde parou."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: ⚠️ Problema atual
      description: Qual problema essa funcionalidade resolve?
      placeholder: |
        Exemplo:
        "Atualmente, ao sair da página, o progresso do usuário é perdido."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Solução sugerida
      description: Como você imagina que isso funcione?
      placeholder: |
        Exemplo:
        "Salvar automaticamente as respostas no banco/localStorage e restaurar ao voltar."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternativas consideradas
      description: Existe outra forma de resolver isso?
      placeholder: |
        Exemplo:
        "Salvar apenas ao clicar em 'Finalizar', mas isso não resolve saídas inesperadas."

  - type: dropdown
    id: impact
    attributes:
      label: 🚀 Impacto esperado
      description: Qual o impacto dessa funcionalidade?
      options:
        - Alto (funcionalidade essencial)
        - Médio (melhora significativa)
        - Baixo (melhoria opcional)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 🗂️ Área do projeto
      options:
        - Simulado
        - Banco de Questões
        - Ranking
        - Login / Conta
        - Painel Admin
        - Interface / UI
        - Backend / API
        - Performance
        - Mobile
        - Outro
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: 🧩 Complexidade (estimativa)
      description: Se tiver noção, selecione.
      options:
        - Baixa
        - Média
        - Alta

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: ✅ Confirmações
      description: Leia antes de enviar.
      options:
        - label: Pesquisei issues existentes e esta sugestão não é duplicada.
          required: true
        - label: Escrevi um título claro e objetivo.
          required: true
        - label: Descrevi corretamente o problema e a solução.
          required: true
